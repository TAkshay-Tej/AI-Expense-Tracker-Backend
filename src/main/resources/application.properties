spring.application.name=ExpenseTracker
# Server
server.port=8080

# Database (H2 for dev, switch to PostgreSQL for prod)
# spring.datasource.url=jdbc:h2:mem:expensedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true
# spring.jpa.hibernate.ddl-auto=update

spring.datasource.url=${RENDER_DATABASE_URL}?sslmode=require
spring.datasource.username=${RENDER_DATABASE_USERNAME}
spring.datasource.password=${RENDER_DATABASE_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update


# JWT
jwt.secret=${JWT_SECRET_KEY}
jwt.expiration=86400000

# Spring AI (OpenAI)
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile
spring.ai.openai.chat.options.temperature=0.3
spring.jpa.show-sql=true
logging.level.com.example.expensetracker=DEBUG
logging.level.org.springframework.security=DEBUG
